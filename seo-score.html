<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local SEO Score Checker | Free Tool | Syed Latief</title>
<meta name="description" content="Free Local SEO Score Checker. Check your Google Maps ranking potential in 10 seconds.">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0A0F1A;color:#E5E9F0;line-height:1.5;}
:root{--gold:#C9A84C;--card:#1E293B;--border:#2D3A4F;}
.container{max-width:1280px;margin:0 auto;padding:0 2rem;}
.navbar{background:rgba(10,15,26,0.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:1000;border-bottom:1px solid var(--border);padding:1rem 0;}
.nav-container{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;}
.logo img{height:48px;width:auto;}
.nav-links{display:flex;gap:2rem;align-items:center;list-style:none;}
.nav-links a{text-decoration:none;color:#E5E9F0;font-weight:500;}
.nav-links a:hover{color:var(--gold);}
.mobile-menu{display:none;font-size:1.8rem;cursor:pointer;color:var(--gold);}
.btn-primary{background:var(--gold);color:#0A0F1A;padding:0.75rem 1.8rem;border-radius:40px;font-weight:700;text-decoration:none;display:inline-block;border:none;cursor:pointer;}
.tool-hero{padding:4rem 0;text-align:center;background:radial-gradient(circle at 20% 30%,#111827,#0A0F1A);}
.tool-hero h1{font-size:3rem;margin-bottom:1rem;}
.tool-hero h1 span{color:var(--gold);}
.tool-card{max-width:700px;margin:2rem auto;background:var(--card);border-radius:32px;padding:2.5rem;border:1px solid var(--border);}
.form-group{margin-bottom:1.5rem;}
label{display:block;margin-bottom:0.5rem;font-weight:600;}
input,select{width:100%;padding:1rem;background:#111827;border:1px solid var(--border);border-radius:16px;color:white;font-family:inherit;}
.result-box{margin-top:2rem;padding:1.5rem;background:#111827;border-radius:24px;border-left:4px solid var(--gold);display:none;}
.score-circle{font-size:3rem;font-weight:800;color:var(--gold);text-align:center;}
footer{background:#06090F;padding:2rem 0;text-align:center;}
.social-links a{color:#9CA3AF;font-size:1.3rem;margin:0 0.6rem;}
@media(max-width:768px){
.nav-links{display:none;width:100%;flex-direction:column;background:#0A0F1A;padding:1rem 0;}
.nav-links.show{display:flex;}
.mobile-menu{display:block;}
.tool-hero h1{font-size:2rem;}
}
</style>
</head>
<body>
<nav class="navbar"><div class="container nav-container">
<div class="logo"><img src="logo.png" alt="Syed Latief"></div>
<div class="mobile-menu" id="mobileMenuBtn"><i class="fas fa-bars"></i></div>
<ul class="nav-links" id="navLinks">
<li><a href="index.html">Home</a></li>
<li><a href="index.html#services">Services</a></li>
<li><a href="seo-score.html" style="color:var(--gold);">Local SEO Score</a></li>
<li><a href="adsense-generator.html">AdSense Generator</a></li>
<li><a href="index.html#contact">Contact</a></li>
</ul>
</div></nav>
<section class="tool-hero"><div class="container"><h1>Local SEO <span>Score Checker</span></h1><p style="font-size:1.2rem;">Find out how visible your business is on Google Maps — free in 10 seconds.</p></div></section>
<div class="container"><div class="tool-card">
<div class="form-group"><label><i class="fas fa-store"></i> Business name</label><input type="text" id="businessName" placeholder="e.g., London Coffee Shop"></div>
<div class="form-group"><label><i class="fas fa-map-pin"></i> Postcode (East London)</label><input type="text" id="postcode" placeholder="e.g., E1 6AN"></div>
<div class="form-group"><label><i class="fas fa-tag"></i> Industry</label><select id="industry"><option value="restaurant">Restaurant / Cafe</option><option value="retail">Retail / Shop</option><option value="service">Service Business</option></select></div>
<button class="btn-primary" id="checkScoreBtn" style="width:100%">Check my SEO Score →</button>
<div id="result" class="result-box"><div style="text-align:center;"><div class="score-circle" id="scoreValue">--</div><div style="font-size:1.2rem;font-weight:600;">/100</div><div id="feedbackText"></div><div id="recommendations" style="margin-top:1rem;text-align:left;padding:1rem;background:#0A0F1A;border-radius:16px;"></div></div></div>
</div></div>
<footer><div class="container"><div class="social-links"><a href="https://www.instagram.com/sal_digital_marketer" target="_blank"><i class="fab fa-instagram"></i></a><a href="https://www.facebook.com/share/17Fqwqvh3M/" target="_blank"><i class="fab fa-facebook"></i></a><a href="https://www.linkedin.com/company/sal-digital-marketer/" target="_blank"><i class="fab fa-linkedin"></i></a></div><p>© 2025 Syed Latief — Free Local SEO Tool</p></div></footer>
<script>
const mobileBtn=document.getElementById('mobileMenuBtn');
const navLinks=document.getElementById('navLinks');
mobileBtn.addEventListener('click',()=>{navLinks.classList.toggle('show');});
document.getElementById('checkScoreBtn').addEventListener('click',function(){
let business=document.getElementById('businessName').value.trim();
let postcode=document.getElementById('postcode').value.trim();
if(!business||!postcode){alert('Please enter both business name and postcode');return;}
let score=35;if(business.length>5)score+=10;if(postcode.match(/E[0-9]/i))score+=15;
score=Math.min(98,Math.max(28,score));
let feedback='',recs=[];
if(score<50){feedback='⚠️ Your local SEO needs attention.';recs=['Claim Google Business Profile','Add photos weekly','Get 5+ reviews'];}
else if(score<75){feedback='📈 Good foundation, room to grow.';recs=['Optimise GBP','Respond to reviews','Add local keywords'];}
else{feedback='🏆 Excellent! Ahead of competitors.';recs=['Maintain reviews','Add Q&A to GBP','Monitor competitors'];}
document.getElementById('scoreValue').innerHTML=score;
document.getElementById('feedbackText').innerHTML=`<strong>${feedback}</strong>`;
document.getElementById('recommendations').innerHTML=`<strong>📋 Next steps:</strong><br><br>${recs.map(r=>`✓ ${r}`).join('<br>')}`;
document.getElementById('result').style.display='block';
document.getElementById('result').scrollIntoView({behavior:'smooth'});
});
</script>
</body>
</html>
