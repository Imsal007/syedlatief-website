<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Your Leads | SAL Digital</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon_io/favicon-32x32.png">
    <style>
        :root {
            --bg-primary: #09090b;
            --bg-secondary: #18181b;
            --bg-card: #1f1f23;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --accent-gold: #FBBF24;
            --accent-neon: #34D399;
            --border-color: #27272a;
            --font-main: 'Inter', system-ui, -apple-system, sans-serif;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-main);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
        }
        
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 3rem;
            text-align: center;
        }
        
        .logo {
            height: 40px;
            margin-bottom: 2rem;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--accent-gold);
        }
        
        p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        
        input[type="email"] {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
        }
        
        input[type="email"]:focus {
            outline: none;
            border-color: var(--accent-gold);
        }
        
        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: var(--accent-gold);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(251, 191, 36, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            display: none;
        }
        
        .error.show {
            display: block;
        }
        
        .success {
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid var(--accent-neon);
            color: var(--accent-neon);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            display: none;
        }
        
        .success.show {
            display: block;
        }
        
        .spinner {
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="./SAL-Digital-Logo.png" alt="SAL Digital" class="logo">
            <h1>🎉 Thank You for Your Purchase!</h1>
            <p>Enter the email address you used to complete your payment, and we'll send you your verified UK B2B leads instantly.</p>
            
            <div class="form-group">
                <label for="emailInput">Email Address</label>
                <input type="email" id="emailInput" placeholder="your@email.com" required>
            </div>
            
            <button class="btn" id="downloadBtn">Download My Leads</button>
            
            <div id="loading" class="spinner" style="display: none;"></div>
            <div id="error" class="error"></div>
            <div id="success" class="success"></div>
        </div>
    </div>

    <script>
        // IMPORTANT: Replace with your actual Worker URL
        const WORKER_URL = 'https://leadforge-api.latiefsyed.workers.dev';
        
        const downloadBtn = document.getElementById('downloadBtn');
        const emailInput = document.getElementById('emailInput');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const success = document.getElementById('success');
        
        downloadBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            
            if (!email || !email.includes('@')) {
                showError('Please enter a valid email address');
                return;
            }
            
            // Show loading
            loading.style.display = 'block';
            downloadBtn.disabled = true;
            error.classList.remove('show');
            success.classList.remove('show');
            
            try {
                // Get URL parameters (passed from Stripe redirect)
                const urlParams = new URLSearchParams(window.location.search);
                const sessionId = urlParams.get('session_id');
                
                // Call Worker to verify payment and download
                let downloadUrl = `${WORKER_URL}/api/download?email=${encodeURIComponent(email)}`;
                if (sessionId) {
                    downloadUrl += `&session_id=${sessionId}`;
                }
                
                // Trigger download
                const response = await fetch(downloadUrl);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || 'Payment verification failed');
                }
                
                // Create blob and download
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'uk-b2b-leads.csv';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                
                // Show success
                showSuccess('✅ Download started! Check your downloads folder.');
                
            } catch (err) {
                showError('❌ ' + err.message + '. Please contact support if the problem persists.');
            } finally {
                loading.style.display = 'none';
                downloadBtn.disabled = false;
            }
        });
        
        function showError(message) {
            error.textContent = message;
            error.classList.add('show');
        }
        
        function showSuccess(message) {
            success.textContent = message;
            success.classList.add('show');
        }
    </script>
</body>
</html>
