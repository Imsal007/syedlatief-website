<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Download Your Leads | SAL Digital</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        body { font-family: system-ui, sans-serif; background: #09090b; color: #fafafa; margin: 0; padding: 0; min-height: 100vh; }
        .header { background: #1f1f23; border-bottom: 1px solid #27272a; padding: 1rem 0; }
        .header-content { max-width: 1000px; margin: 0 auto; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { height: 40px; width: auto; }
        .header-links a { color: #a1a1aa; text-decoration: none; margin-left: 2rem; transition: color 0.3s; font-weight: 500; }
        .header-links a:hover { color: #FBBF24; }
        .main-content { display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 100px); padding: 2rem; }
        .card { background: #1f1f23; padding: 3rem; border-radius: 12px; border: 1px solid #27272a; max-width: 500px; width: 100%; text-align: center; }
        h1 { color: #FBBF24; margin-bottom: 1rem; font-size: 2rem; }
        p { color: #a1a1aa; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input { width: 100%; padding: 12px; background: #09090b; border: 1px solid #27272a; border-radius: 8px; color: #fafafa; }
        .btn { width: 100%; padding: 16px; background: #FBBF24; color: #000; border: none; border-radius: 8px; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(251, 191, 36, 0.3); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .spinner { border: 3px solid #27272a; border-top-color: #FBBF24; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 1rem auto; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { color: #EF4444; margin-top: 1rem; display: none; text-align: left; word-break: break-word; background: rgba(239, 68, 68, 0.1); padding: 1rem; border-radius: 8px; }
        .success { color: #34D399; margin-top: 1rem; display: none; background: rgba(52, 211, 153, 0.1); padding: 1rem; border-radius: 8px; }
        .info-box { background: #27272a; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; text-align: left; }
        .info-box strong { color: #FBBF24; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <img src="./SAL-Digital-Logo.png" alt="SAL Digital" class="logo">
            <nav class="header-links">
                <a href="./index.html">Home</a>
                <a href="./contact.html">Contact</a>
            </nav>
        </div>
    </header>

    <div class="main-content">
        <div class="card">
            <h1>✅ Payment Successful!</h1>
            <p>Your category is locked to your purchase. Enter your email to download your 50 new business leads.</p>

            <div class="info-box">
                <div style="margin-bottom: 0.5rem;"><strong>Industry:</strong> <span id="displayIndustry">Loading...</span></div>
                <div><strong>Location:</strong> <span id="displayLocation">Loading...</span></div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="emailInput" placeholder="your@email.com">
            </div>

            <button class="btn" id="downloadBtn">Download CSV</button>
            <div id="loading" class="spinner"></div>
            <div id="error" class="error"></div>
            <div id="success" class="success"></div>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://leadforge-api.latiefsyed.workers.dev';

        const sicNames = {
            '68310': 'Estate Agents', '56101': 'Restaurants & Cafes', '47220': 'Retail Butchers',
            '96020': 'Hair & Beauty Salons', '69102': 'Solicitors', '41201': 'Construction',
            '62020': 'IT Consultancy', '70229': 'Management Consultancy', '69201': 'Accountants',
            '66220': 'Insurance Agents', '73110': 'Advertising Agencies'
        };

        // FIXED: Renamed 'location' to 'userLocation' to avoid collision with window.location
        function readStored(key) {
            try {
                return sessionStorage.getItem(key) || localStorage.getItem(key) || '';
            } catch (e) {
                return '';
            }
        }

        const params = new URLSearchParams(window.location.search);
        const sic = readStored('lead_sic') || params.get('sic') || '68310';
        const userLocation = readStored('lead_location') || params.get('location') || '';

        // Display values
        document.getElementById('displayIndustry').textContent = sicNames[sic] || sic || 'Selected Industry';
        document.getElementById('displayLocation').textContent = userLocation || 'UK Wide (All Locations)';

        // Handle download
        document.getElementById('downloadBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value.trim();
            const errorEl = document.getElementById('error');
            const successEl = document.getElementById('success');
            const loadingEl = document.getElementById('loading');
            const btn = document.getElementById('downloadBtn');

            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            if (!email.includes('@')) {
                errorEl.textContent = 'Please enter a valid email address';
                errorEl.style.display = 'block';
                return;
            }

            loadingEl.style.display = 'block';
            btn.disabled = true;

            try {
                let url = `${WORKER_URL}/api/download?sic=${encodeURIComponent(sic)}&days=30`;
                if (userLocation) url += `&location=${encodeURIComponent(userLocation)}`;
                if (email) url += `&email=${encodeURIComponent(email)}`;

                const res = await fetch(url);

                if (!res.ok) {
                    const bodyText = await res.text().catch(() => '');
                    throw new Error(`Server returned ${res.status}: ${bodyText || 'no details'}`);
                }

                const blob = await res.blob();

                if (blob.size === 0) {
                    throw new Error('Received empty file from server. No companies found for these filters.');
                }

                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'new-uk-business-leads.csv';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(a.href);

                successEl.textContent = '✅ Download started! Check your downloads folder.';
                successEl.style.display = 'block';
            } catch (e) {
                errorEl.textContent = '❌ Error: ' + e.message;
                errorEl.style.display = 'block';
            } finally {
                loadingEl.style.display = 'none';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
