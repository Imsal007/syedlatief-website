<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Download Your Leads | SAL Digital</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        body { font-family: system-ui, sans-serif; background: #09090b; color: #fafafa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1f1f23; padding: 3rem; border-radius: 12px; border: 1px solid #27272a; max-width: 500px; width: 100%; text-align: center; }
        h1 { color: #FBBF24; margin-bottom: 1rem; }
        p { color: #a1a1aa; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input, select { width: 100%; padding: 12px; background: #09090b; border: 1px solid #27272a; border-radius: 8px; color: #fafafa; }
        input:disabled, select:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn { width: 100%; padding: 16px; background: #FBBF24; color: #000; border: none; border-radius: 8px; font-weight: 700; font-size: 1.1rem; cursor: pointer; }
        .btn:disabled { opacity: 0.6; }
        .spinner { border: 3px solid #27272a; border-top-color: #FBBF24; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 1rem auto; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { color: #EF4444; margin-top: 1rem; display: none; }
        .success { color: #34D399; margin-top: 1rem; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1> Payment Successful!</h1>
        <p>Your category is locked to your purchase. Enter your email to download your 50 new business leads.</p>
        
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="emailInput" placeholder="your@email.com">
        </div>
        
        <div class="form-group">
            <label>Industry (Locked)</label>
            <select id="industrySelect" disabled></select>
        </div>
        
        <div class="form-group">
            <label>Location (Locked)</label>
            <input type="text" id="locationInput" disabled>
        </div>

        <button class="btn" id="downloadBtn">Download CSV</button>
        <div id="loading" class="spinner"></div>
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
    </div>

    <script>
        const WORKER_URL = 'https://leadforge-api.latiefsyed.workers.dev';
        
        // Read from localStorage (saved before Stripe redirect)
        const sic = localStorage.getItem('lead_sic') || '68310';
        const location = localStorage.getItem('lead_location') || '';
        
        // Populate and lock fields
        const industrySelect = document.getElementById('industrySelect');
        const locationInput = document.getElementById('locationInput');
        
        // Map SIC codes to names for display
        const sicNames = {
            '68310': 'Estate Agents', '56101': 'Restaurants & Cafes', '47220': 'Retail Butchers',
            '96020': 'Hair & Beauty Salons', '69102': 'Solicitors', '41201': 'Construction',
            '62020': 'IT Consultancy', '70229': 'Management Consultancy'
        };
        
        industrySelect.innerHTML = `<option>${sicNames[sic] || 'Selected Industry'}</option>`;
        locationInput.value = location || 'UK Wide';
        
        document.getElementById('downloadBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value.trim();
            if (!email.includes('@')) {
                document.getElementById('error').textContent = 'Please enter a valid email';
                document.getElementById('error').style.display = 'block';
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('downloadBtn').disabled = true;
            
            try {
                let url = `${WORKER_URL}/api/download?sic=${sic}&days=30`;
                if (location) url += `&location=${encodeURIComponent(location)}`;
                
                const res = await fetch(url);
                if (!res.ok) throw new Error('Failed to generate');
                
                const blob = await res.blob();
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'new-uk-business-leads.csv';
                a.click();
                
                document.getElementById('success').textContent = '✅ Download started!';
                document.getElementById('success').style.display = 'block';
            } catch (e) {
                document.getElementById('error').textContent = '❌ Error: ' + e.message;
                document.getElementById('error').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('downloadBtn').disabled = false;
            }
        });
    </script>
</body>
</html>
