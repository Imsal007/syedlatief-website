<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Download Your Leads | SAL Digital</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        body { font-family: system-ui, sans-serif; background: #09090b; color: #fafafa; margin: 0; padding: 0; min-height: 100vh; }
        
        /* Header with Logo */
        .header {
            background: #1f1f23;
            border-bottom: 1px solid #27272a;
            padding: 1rem 0;
        }
        .header-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            height: 40px;
            width: auto;
        }
        .header-links a {
            color: #a1a1aa;
            text-decoration: none;
            margin-left: 2rem;
            transition: color 0.3s;
            font-weight: 500;
        }
        .header-links a:hover {
            color: #FBBF24;
        }
        
        .main-content { display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 100px); padding: 2rem; }
        .card { background: #1f1f23; padding: 3rem; border-radius: 12px; border: 1px solid #27272a; max-width: 500px; width: 100%; text-align: center; }
        h1 { color: #FBBF24; margin-bottom: 1rem; font-size: 2rem; }
        p { color: #a1a1aa; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input, select { width: 100%; padding: 12px; background: #09090b; border: 1px solid #27272a; border-radius: 8px; color: #fafafa; }
        input:disabled, select:disabled { opacity: 0.7; cursor: not-allowed; }
        .btn { width: 100%; padding: 16px; background: #FBBF24; color: #000; border: none; border-radius: 8px; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: all 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(251, 191, 36, 0.3); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .spinner { border: 3px solid #27272a; border-top-color: #FBBF24; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 1rem auto; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { color: #EF4444; margin-top: 1rem; display: none; text-align: left; word-break: break-word; background: rgba(239, 68, 68, 0.1); padding: 1rem; border-radius: 8px; }
        .success { color: #34D399; margin-top: 1rem; display: none; background: rgba(52, 211, 153, 0.1); padding: 1rem; border-radius: 8px; }
        .info-box { background: #27272a; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; text-align: left; }
        .info-box strong { color: #FBBF24; }
        
        @media (max-width: 768px) {
            .header-content { flex-direction: column; gap: 1rem; }
            .header-links a { margin: 0 1rem; }
            .card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <!-- Header with Logo -->
    <header class="header">
        <div class="header-content">
            <img src="./SAL-Digital-Logo.png" alt="SAL Digital" class="logo">
            <nav class="header-links">
                <a href="./index.html">Home</a>
                <a href="./contact.html">Contact</a>
            </nav>
        </div>
    </header>

    <div class="main-content">
        <div class="card">
            <h1>✅ Payment Successful!</h1>
            <p>Your category is locked to your purchase. Enter your email to download your 50 new business leads.</p>

            <div class="info-box">
                <div style="margin-bottom: 0.5rem;"><strong>Industry:</strong> <span id="displayIndustry">Loading...</span></div>
                <div><strong>Location:</strong> <span id="displayLocation">Loading...</span></div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="emailInput" placeholder="your@email.com">
            </div>

            <button class="btn" id="downloadBtn">Download CSV</button>
            <div id="loading" class="spinner"></div>
            <div id="error" class="error"></div>
            <div id="success" class="success"></div>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://leadforge-api.latiefsyed.workers.dev';

        // Expanded SIC code mapping
        const sicNames = {
            // Property & Real Estate
            '68310': 'Estate Agents',
            '68100': 'Buying & Selling of Real Estate',
            '68209': 'Other letting and operating of own or leased real estate',
            '68320': 'Management of real estate on a fee or contract basis',
            
            // Hospitality & Food
            '56101': 'Licensed Restaurants & Cafes',
            '56102': 'Unlicensed restaurants and cafes',
            '56302': 'Public houses and bars',
            
            // Professional Services
            '69201': 'Accounting and auditing activities',
            '69202': 'Bookkeeping activities',
            '69102': 'Solicitors',
            '70229': 'Management consultancy activities',
            '74909': 'Other professional, scientific and technical activities',
            
            // Financial & Insurance
            '64999': 'Financial intermediation',
            '66220': 'Activities of insurance agents and brokers',
            
            // Construction & Trades
            '41201': 'Construction of commercial and domestic buildings',
            '41202': 'Construction of other buildings',
            '43110': 'Demolition',
            '43999': 'Other specialised construction activities',
            
            // Beauty & Personal Services
            '96020': 'Hairdressing and other beauty treatment',
            
            // Retail
            '47220': 'Retail sale of meat and meat products',
            
            // Technology & IT
            '62020': 'Information technology consultancy activities',
            '62012': 'Business and domestic software development',
            
            // Marketing & Advertising
            '73110': 'Advertising agencies',
            '73120': 'Media representation',
            
            // Education & Training
            '85320': 'Technical and vocational secondary education',
            
            // Engineering
            '71129': 'Other engineering activities',
            
            // Other Business Services
            '82990': 'Other business support service activities'
        };

        // Read from storage
        function readStored(key) {
            try {
                return sessionStorage.getItem(key) || localStorage.getItem(key) || '';
            } catch (e) {
                return '';
            }
        }

        const params = new URLSearchParams(window.location.search);
        const sic = readStored('lead_sic') || params.get('sic') || '68310';
        const userLocation = readStored('lead_location') || params.get('location') || '';

        // Display values
        document.getElementById('displayIndustry').textContent = sicNames[sic] || sic || 'Selected Industry';
        document.getElementById('displayLocation').textContent = userLocation || 'UK Wide (All Locations)';

        // Handle download
        document.getElementById('downloadBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value.trim();
            const errorEl = document.getElementById('error');
            const successEl = document.getElementById('success');
            const loadingEl = document.getElementById('loading');
            const btn = document.getElementById('downloadBtn');

            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            if (!email.includes('@')) {
                errorEl.textContent = 'Please enter a valid email address';
                errorEl.style.display = 'block';
                return;
            }

            loadingEl.style.display = 'block';
            btn.disabled = true;

            try {
                let url = `${WORKER_URL}/api/download?sic=${encodeURIComponent(sic)}&days=30`;
                if (userLocation) url += `&location=${encodeURIComponent(userLocation)}`;
                if (email) url += `&email=${encodeURIComponent(email)}`;

                const res = await fetch(url);

                if (!res.ok) {
                    const bodyText = await res.text().catch(() => '');
                    throw new Error(`Server returned ${res.status}: ${bodyText || 'no details'}`);
                }

                const blob = await res.blob();

                if (blob.size === 0) {
                    throw new Error('Received empty file from server. No companies found for these filters.');
                }

                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'new-uk-business-leads.csv';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(a.href);

                successEl.textContent = '✅ Download started! Check your downloads folder.';
                successEl.style.display = 'block';
            } catch (e) {
                errorEl.textContent = '❌ Error: ' + e.message;
                errorEl.style.display = 'block';
            } finally {
                loadingEl.style.display = 'none';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
