<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Download Your Leads | SAL Digital</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        body { font-family: system-ui, sans-serif; background: #09090b; color: #fafafa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 1rem; }
        .card { background: #1f1f23; padding: 3rem; border-radius: 12px; border: 1px solid #27272a; max-width: 500px; width: 100%; text-align: center; }
        h1 { color: #FBBF24; margin-bottom: 1rem; }
        p { color: #a1a1aa; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input, select { width: 100%; padding: 12px; background: #09090b; border: 1px solid #27272a; border-radius: 8px; color: #fafafa; }
        input:disabled, select:disabled { opacity: 0.7; cursor: not-allowed; }
        .btn { width: 100%; padding: 16px; background: #FBBF24; color: #000; border: none; border-radius: 8px; font-weight: 700; font-size: 1.1rem; cursor: pointer; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .spinner { border: 3px solid #27272a; border-top-color: #FBBF24; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 1rem auto; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { color: #EF4444; margin-top: 1rem; display: none; text-align: left; word-break: break-word; }
        .success { color: #34D399; margin-top: 1rem; display: none; }
        .info-box { background: #27272a; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; text-align: left; }
        .info-box strong { color: #FBBF24; }
    </style>
</head>
<body>
    <div class="card">
        <h1>✅ Payment Successful!</h1>
        <p>Your category is locked to your purchase. Enter your email to download your 50 new business leads.</p>

        <div class="info-box">
            <div style="margin-bottom: 0.5rem;"><strong>Industry:</strong> <span id="displayIndustry">—</span></div>
            <div><strong>Location:</strong> <span id="displayLocation">—</span></div>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="emailInput" placeholder="your@email.com">
        </div>

        <button class="btn" id="downloadBtn">Download CSV</button>
        <div id="loading" class="spinner"></div>
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
    </div>

    <script>
        const WORKER_URL = 'https://leadforge-api.latiefsyed.workers.dev';

        const sicNames = {
            '68310': 'Estate Agents',
            '56101': 'Restaurants & Cafes',
            '47220': 'Retail Butchers',
            '96020': 'Hair & Beauty Salons',
            '69102': 'Solicitors',
            '41201': 'Construction',
            '62020': 'IT Consultancy',
            '70229': 'Management Consultancy'
        };

        // Read from sessionStorage first, fall back to localStorage,
        // then fall back to URL params (?sic=...&location=...) as a
        // last resort if Stripe is configured to pass them through.
        function readStored(key) {
            try {
                return sessionStorage.getItem(key) || localStorage.getItem(key) || '';
            } catch (e) {
                return '';
            }
        }

        const params = new URLSearchParams(window.location.search);
        const sic = readStored('lead_sic') || params.get('sic') || '68310';
        const location = readStored('lead_location') || params.get('location') || '';

        document.getElementById('displayIndustry').textContent = sicNames[sic] || sic || 'Selected Industry';
        document.getElementById('displayLocation').textContent = location || 'UK Wide (All Locations)';

        document.getElementById('downloadBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value.trim();
            const errorEl = document.getElementById('error');
            const successEl = document.getElementById('success');
            const loadingEl = document.getElementById('loading');
            const btn = document.getElementById('downloadBtn');

            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            if (!email.includes('@')) {
                errorEl.textContent = 'Please enter a valid email';
                errorEl.style.display = 'block';
                return;
            }

            loadingEl.style.display = 'block';
            btn.disabled = true;

            try {
                let url = `${WORKER_URL}/api/download?sic=${encodeURIComponent(sic)}&days=30`;
                if (location) url += `&location=${encodeURIComponent(location)}`;
                if (email) url += `&email=${encodeURIComponent(email)}`;

                const res = await fetch(url);

                if (!res.ok) {
                    const bodyText = await res.text().catch(() => '');
                    throw new Error(`Server returned ${res.status}: ${bodyText || 'no details'}`);
                }

                const blob = await res.blob();

                if (blob.size === 0) {
                    throw new Error('Received empty file from server');
                }

                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'new-uk-business-leads.csv';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(a.href);

                successEl.textContent = '✅ Download started! Check your downloads folder.';
                successEl.style.display = 'block';
            } catch (e) {
                errorEl.textContent = '❌ Error: ' + e.message;
                errorEl.style.display = 'block';
            } finally {
                loadingEl.style.display = 'none';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
