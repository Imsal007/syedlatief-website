<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdSense Ad Generator | Free Tool | Syed Latief</title>
<meta name="description" content="Free AdSense ad code generator. Create responsive Google AdSense ad units in seconds.">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0A0F1A;color:#E5E9F0;}
:root{--gold:#C9A84C;--card:#1E293B;--border:#2D3A4F;}
.container{max-width:1280px;margin:0 auto;padding:0 2rem;}
.navbar{background:rgba(10,15,26,0.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:1000;border-bottom:1px solid var(--border);padding:1rem 0;}
.nav-container{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;}
.logo img{height:48px;width:auto;}
.nav-links{display:flex;gap:2rem;align-items:center;list-style:none;}
.nav-links a{text-decoration:none;color:#E5E9F0;font-weight:500;}
.nav-links a:hover{color:var(--gold);}
.mobile-menu{display:none;font-size:1.8rem;cursor:pointer;color:var(--gold);}
.btn-primary{background:var(--gold);color:#0A0F1A;padding:0.75rem 1.8rem;border-radius:40px;font-weight:700;border:none;cursor:pointer;}
.tool-hero{padding:4rem 0;text-align:center;background:radial-gradient(circle at 20% 30%,#111827,#0A0F1A);}
.tool-hero h1{font-size:3rem;margin-bottom:1rem;}
.tool-hero h1 span{color:var(--gold);}
.tool-card{max-width:700px;margin:2rem auto;background:var(--card);border-radius:32px;padding:2.5rem;border:1px solid var(--border);}
.form-group{margin-bottom:1.5rem;}
label{display:block;margin-bottom:0.5rem;font-weight:600;}
select{width:100%;padding:1rem;background:#111827;border:1px solid var(--border);border-radius:16px;color:white;}
.code-output{margin-top:2rem;padding:1.5rem;background:#111827;border-radius:24px;}
pre{background:#0A0F1A;padding:1rem;border-radius:12px;overflow-x:auto;font-size:0.8rem;}
.copy-btn{background:var(--gold);color:#0A0F1A;padding:0.5rem 1rem;border-radius:8px;border:none;cursor:pointer;margin-top:1rem;}
footer{background:#06090F;padding:2rem 0;text-align:center;}
@media(max-width:768px){
.nav-links{display:none;width:100%;flex-direction:column;}
.nav-links.show{display:flex;}
.mobile-menu{display:block;}
}
</style>
</head>
<body>
<nav class="navbar"><div class="container nav-container">
<div class="logo"><img src="logo.png" alt="Syed Latief"></div>
<div class="mobile-menu" id="mobileMenuBtn"><i class="fas fa-bars"></i></div>
<ul class="nav-links" id="navLinks">
<li><a href="index.html">Home</a></li>
<li><a href="seo-score.html">Local SEO Score</a></li>
<li><a href="adsense-generator.html" style="color:var(--gold);">AdSense Generator</a></li>
<li><a href="index.html#contact">Contact</a></li>
</ul>
</div></nav>
<section class="tool-hero"><div class="container"><h1>AdSense <span>Ad Generator</span></h1><p style="font-size:1.2rem;">Generate responsive Google AdSense code in seconds.</p></div></section>
<div class="container"><div class="tool-card">
<div class="form-group"><label><i class="fas fa-ad"></i> Ad format</label><select id="adFormat"><option value="horizontal">Horizontal (728x90)</option><option value="square">Square (300x250)</option><option value="vertical">Vertical (160x600)</option><option value="responsive">Responsive (auto)</option></select></div>
<div class="form-group"><label><i class="fas fa-palette"></i> Style</label><select id="adStyle"><option value="light">Light background + dark text</option><option value="dark">Dark background + light text</option></select></div>
<button class="btn-primary" id="generateBtn" style="width:100%">Generate Ad Code →</button>
<div class="code-output" id="codeOutput" style="display:none;"><label><i class="fas fa-code"></i> Copy this code to your website:</label><pre id="adCode"></pre><button class="copy-btn" id="copyBtn"><i class="fas fa-copy"></i> Copy code</button></div>
</div></div>
<footer><div class="container"><div class="social-links"><a href="https://www.instagram.com/sal_digital_marketer" target="_blank"><i class="fab fa-instagram"></i></a><a href="https://www.facebook.com/share/17Fqwqvh3M/" target="_blank"><i class="fab fa-facebook"></i></a><a href="https://www.linkedin.com/company/sal-digital-marketer/" target="_blank"><i class="fab fa-linkedin"></i></a></div><p>© 2025 Syed Latief — Free AdSense Code Generator</p></div></footer>
<script>
const mobileBtn=document.getElementById('mobileMenuBtn');
const navLinks=document.getElementById('navLinks');
mobileBtn.addEventListener('click',()=>{navLinks.classList.toggle('show');});
document.getElementById('generateBtn').addEventListener('click',function(){
let format=document.getElementById('adFormat').value;
let style=document.getElementById('adStyle').value;
let width,height;
if(format==='horizontal'){width=728;height=90;}
else if(format==='square'){width=300;height=250;}
else if(format==='vertical'){width=160;height=600;}
else{width='100%';height='auto';}
let bgColor=(style==='light')?'#FFFFFF':'#1A1A2E';
let textColor=(style==='light')?'#000000':'#FFFFFF';
let code=`<!-- AdSense Ad Unit - Generated by Syed Latief -->
<ins class="adsbygoogle"
     style="display:inline-block;width:${width}px;height:${height}px"
     data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
     data-ad-slot="XXXXXXXXXX"></ins>
<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
<\/script>`;
document.getElementById('adCode').innerText=code;
document.getElementById('codeOutput').style.display='block';
});
document.getElementById('copyBtn').addEventListener('click',function(){
let code=document.getElementById('adCode').innerText;
navigator.clipboard.writeText(code);
alert('✅ Ad code copied! Replace XXXXXXXXXXXXXXXX with your AdSense publisher ID.');
});
</script>
</body>
</html>
